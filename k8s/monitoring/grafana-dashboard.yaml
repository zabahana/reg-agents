# Grafana dashboard for reg-agents, auto-imported by the kube-prometheus-stack
# Grafana sidecar (it watches for ConfigMaps labelled grafana_dashboard=1).
apiVersion: v1
kind: ConfigMap
metadata:
  name: reg-agents-dashboard
  namespace: reg-agents
  labels:
    grafana_dashboard: "1"
data:
  reg-agents-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 1,
      "title": "reg-agents — agents, model & GPU",
      "uid": "reg-agents-overview",
      "tags": ["reg-agents", "nvidia", "triton", "gpu"],
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "schemaVersion": 39,
      "version": 2,
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0
          },
          {
            "name": "app",
            "type": "query",
            "datasource": "${datasource}",
            "query": "label_values(http_requests_total, app)",
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" },
            "refresh": 2
          }
        ]
      },
      "panels": [
        {
          "type": "row",
          "title": "A2A agents (FastAPI)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "timeseries",
          "title": "Request rate by agent (req/s)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (app) (rate(http_requests_total{app=~\"$app\"}[5m]))", "legendFormat": "{{app}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "p95 request latency by agent",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "histogram_quantile(0.95, sum by (app, le) (rate(http_request_duration_seconds_bucket{app=~\"$app\"}[5m])))", "legendFormat": "{{app}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "5xx error rate by agent",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (app) (rate(http_requests_total{app=~\"$app\",status=~\"5..|5xx\"}[5m]))", "legendFormat": "{{app}}" }
          ]
        },
        {
          "type": "stat",
          "title": "Requests in last 5m (all agents)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum(increase(http_requests_total{app=~\"$app\"}[5m]))", "legendFormat": "requests" }
          ]
        },
        {
          "type": "row",
          "title": "Fraud model behavior & guardrails",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 17 }
        },
        {
          "type": "timeseries",
          "title": "Fraud decisions by outcome (per s)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 18 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (decision) (rate(fraud_decisions_total[5m]))", "legendFormat": "{{decision}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Fraud probability percentiles",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 18 },
          "fieldConfig": { "defaults": { "unit": "short", "min": 0, "max": 1 }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "histogram_quantile(0.5, sum by (le) (rate(fraud_probability_bucket[10m])))", "legendFormat": "p50" },
            { "datasource": "${datasource}", "expr": "histogram_quantile(0.95, sum by (le) (rate(fraud_probability_bucket[10m])))", "legendFormat": "p95" }
          ]
        },
        {
          "type": "stat",
          "title": "BLOCK rate (10m) — guardrail",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 0.4 }, { "color": "red", "value": 0.5 } ] }
            },
            "overrides": []
          },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum(rate(fraud_decisions_total{decision=\"BLOCK\"}[10m])) / clamp_min(sum(rate(fraud_decisions_total[10m])), 0.001)", "legendFormat": "block rate" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Guardrail triggers by rule (15m)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 26 },
          "fieldConfig": { "defaults": { "unit": "short" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (rule) (increase(fraud_guardrail_triggered_total[15m]))", "legendFormat": "{{rule}}" }
          ]
        },
        {
          "type": "row",
          "title": "Triton Inference Server (fraud model)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 34 }
        },
        {
          "type": "timeseries",
          "title": "Triton inference success rate (infer/s)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 35 },
          "fieldConfig": { "defaults": { "unit": "reqps" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (model) (rate(nv_inference_request_success[5m]))", "legendFormat": "{{model}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Triton avg queue/compute latency per inference",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 35 },
          "fieldConfig": { "defaults": { "unit": "µs" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "sum by (model) (rate(nv_inference_compute_infer_duration_us[5m])) / clamp_min(sum by (model) (rate(nv_inference_request_success[5m])), 1)", "legendFormat": "compute {{model}}" },
            { "datasource": "${datasource}", "expr": "sum by (model) (rate(nv_inference_queue_duration_us[5m])) / clamp_min(sum by (model) (rate(nv_inference_request_success[5m])), 1)", "legendFormat": "queue {{model}}" }
          ]
        },
        {
          "type": "row",
          "title": "GPU (NVIDIA DCGM exporter)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 43 }
        },
        {
          "type": "timeseries",
          "title": "GPU utilization %",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 44 },
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "avg by (gpu) (DCGM_FI_DEV_GPU_UTIL)", "legendFormat": "gpu {{gpu}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "GPU memory used (MiB)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 44 },
          "fieldConfig": { "defaults": { "unit": "decmbytes" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "avg by (gpu) (DCGM_FI_DEV_FB_USED)", "legendFormat": "used gpu {{gpu}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "GPU temperature (°C) — guardrail > 85",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 44 },
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 85 } ] }
            },
            "overrides": []
          },
          "targets": [
            { "datasource": "${datasource}", "expr": "avg by (gpu) (DCGM_FI_DEV_GPU_TEMP)", "legendFormat": "gpu {{gpu}}" }
          ]
        },
        {
          "type": "timeseries",
          "title": "GPU power draw (W)",
          "datasource": "${datasource}",
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 52 },
          "fieldConfig": { "defaults": { "unit": "watt" }, "overrides": [] },
          "targets": [
            { "datasource": "${datasource}", "expr": "avg by (gpu) (DCGM_FI_DEV_POWER_USAGE)", "legendFormat": "gpu {{gpu}}" }
          ]
        }
      ]
    }
