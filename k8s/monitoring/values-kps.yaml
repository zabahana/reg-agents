# Helm values for kube-prometheus-stack tuned for reg-agents.
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     -n monitoring --create-namespace -f k8s/monitoring/values-kps.yaml
#
# - Prometheus picks up ALL ServiceMonitors (not just release-labelled ones).
# - Grafana auto-imports dashboard ConfigMaps (label grafana_dashboard=1) from
#   ANY namespace, so our dashboard in the reg-agents namespace is loaded.
prometheus:
  prometheusSpec:
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

grafana:
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
  # Demo login (change for anything real):
  adminPassword: "reg-agents"

# Alertmanager ships with kube-prometheus-stack; this routes our guardrail
# alerts. Replace the Slack api_url with your webhook (or use a secret +
# api_url_file). Placeholder is harmless — alerts still show in the AM UI.
alertmanager:
  config:
    global:
      resolve_timeout: 5m
    route:
      receiver: default
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers: ['severity="warning"']
          receiver: slack
          continue: true
    receivers:
      - name: default
      - name: slack
        slack_configs:
          - channel: '#reg-agents-alerts'
            api_url: 'https://hooks.slack.com/services/REPLACE/WITH/WEBHOOK'
            send_resolved: true
            title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }} ({{ .CommonLabels.severity }})'
            text: >-
              {{ range .Alerts }}*{{ .Annotations.summary }}*
              {{ .Annotations.description }}
              {{ end }}
    inhibit_rules:
      - source_matchers: ['severity="warning"']
        target_matchers: ['severity="info"']
        equal: [alertname]
