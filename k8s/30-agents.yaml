# A2A agents (CPU). Each is a FastAPI service exposing /health, the A2A endpoint,
# and Prometheus /metrics. Services carry `part-of: reg-agents` + a named `http`
# port so the ServiceMonitor in k8s/monitoring/ can scrape them.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retriever-agent
  namespace: reg-agents
spec:
  replicas: 1
  selector: { matchLabels: { app: retriever-agent } }
  template:
    metadata: { labels: { app: retriever-agent } }
    spec:
      containers:
        - name: app
          image: REPLACE_IMAGE
          command: ["python", "-m", "uvicorn", "reg_agents.agents.retriever_agent:app", "--host", "0.0.0.0", "--port", "8101"]
          envFrom:
            - configMapRef: { name: reg-agents-config }
            - secretRef: { name: reg-agents-secrets }
          ports: [{ name: http, containerPort: 8101 }]
          readinessProbe: { httpGet: { path: /health, port: 8101 }, initialDelaySeconds: 5 }
---
apiVersion: v1
kind: Service
metadata: { name: retriever-agent, namespace: reg-agents, labels: { app: retriever-agent, part-of: reg-agents } }
spec:
  selector: { app: retriever-agent }
  ports: [{ name: http, port: 8101, targetPort: 8101 }]
---
