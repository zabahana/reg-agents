# Streamlit UI + external access.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: reg-agents
spec:
  replicas: 1
  selector: { matchLabels: { app: ui } }
  template:
    metadata: { labels: { app: ui } }
    spec:
      containers:
        - name: app
          image: REPLACE_IMAGE
          command: ["streamlit", "run", "reg_agents/ui/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
          envFrom:
            - configMapRef: { name: reg-agents-config }
            - secretRef: { name: reg-agents-secrets }
          ports: [{ containerPort: 8501 }]
---
apiVersion: v1
kind: Service
metadata: { name: ui, namespace: reg-agents }
spec:
  type: LoadBalancer   # GKE provisions an external IP; or use Ingress below.
  selector: { app: ui }
  ports: [{ port: 80, targetPort: 8501 }]
---
# Optional GKE Ingress exposing both the UI and the orchestrator API.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reg-agents-ingress
  namespace: reg-agents
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend: { service: { name: ui, port: { number: 80 } } }
          - path: /api
            pathType: Prefix
            backend: { service: { name: orchestrator, port: { number: 8100 } } }
