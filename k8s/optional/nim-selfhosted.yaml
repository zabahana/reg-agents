# -----------------------------------------------------------------------------
# OPTIONAL: self-host NIM (LLM) + NeMo Retriever (embeddings) on GPUs instead of
# using the hosted NVIDIA catalog.
#
# Apply this ONLY if you want in-cluster inference. You must then:
#   1. Point 01-config.yaml back at cluster DNS:
#        NIM_BASE_URL:       http://nim-llm:8000/v1
#        NEMO_EMBED_BASE_URL: http://nemo-retriever:8000/v1
#   2. Size the GPU pool for 3 GPUs (NIM + retriever + Triton) or split nodes.
#   3. Create the NGC secrets (image pull + runtime key):
#        kubectl -n reg-agents create secret docker-registry ngc-secret \
#          --docker-server=nvcr.io --docker-username='$oauthtoken' \
#          --docker-password="$NGC_API_KEY"
#        kubectl -n reg-agents create secret generic ngc-api \
#          --from-literal=NGC_API_KEY="$NGC_API_KEY"
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nim-llm
  namespace: reg-agents
  labels: { app: nim-llm, part-of: reg-agents }
spec:
  replicas: 1
  selector:
    matchLabels: { app: nim-llm }
  template:
    metadata:
      labels: { app: nim-llm, part-of: reg-agents }
    spec:
      imagePullSecrets:
        - name: ngc-secret
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nim-llm
          image: nvcr.io/nim/meta/llama-3.1-8b-instruct:latest
          ports: [{ name: http, containerPort: 8000 }]
          env:
            - name: NGC_API_KEY
              valueFrom: { secretKeyRef: { name: ngc-api, key: NGC_API_KEY } }
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - { name: nim-cache, mountPath: /opt/nim/.cache }
          readinessProbe:
            httpGet: { path: /v1/health/ready, port: 8000 }
            initialDelaySeconds: 60
            periodSeconds: 15
      volumes:
        - name: nim-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nim-llm
  namespace: reg-agents
  labels: { app: nim-llm, part-of: reg-agents }
spec:
  selector: { app: nim-llm }
  ports: [{ name: http, port: 8000, targetPort: 8000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nemo-retriever
  namespace: reg-agents
  labels: { app: nemo-retriever, part-of: reg-agents }
spec:
  replicas: 1
  selector:
    matchLabels: { app: nemo-retriever }
  template:
    metadata:
      labels: { app: nemo-retriever, part-of: reg-agents }
    spec:
      imagePullSecrets:
        - name: ngc-secret
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      containers:
        - name: nemo-retriever
          image: nvcr.io/nim/nvidia/nv-embedqa-e5-v5:latest
          ports: [{ name: http, containerPort: 8000 }]
          env:
            - name: NGC_API_KEY
              valueFrom: { secretKeyRef: { name: ngc-api, key: NGC_API_KEY } }
          resources:
            limits:
              nvidia.com/gpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: nemo-retriever
  namespace: reg-agents
  labels: { app: nemo-retriever, part-of: reg-agents }
spec:
  selector: { app: nemo-retriever }
  ports: [{ name: http, port: 8000, targetPort: 8000 }]
