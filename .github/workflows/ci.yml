name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint (ruff)
        run: ruff check reg_agents
      - name: Unit tests (pytest)
        run: pytest -q
        env:
          # Tests run fully offline via lexical + heuristic fallbacks.
          LLM_PROVIDER: openai
          OPENAI_API_KEY: ""

  docker-build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image (smoke)
        run: docker build -t reg-agents:ci .

  # ---------------------------------------------------------------------------
  # Deploy to GKE on pushes to main. Gated on repo secrets being present so
  # forks/PRs never attempt it. Configure:
  #   GCP_PROJECT, GCP_SA_KEY (JSON), GKE_CLUSTER, GKE_ZONE, GAR_IMAGE
  # ---------------------------------------------------------------------------
  deploy:
    needs: docker-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Guard on secrets
        id: guard
        run: |
          if [ -z "${{ secrets.GCP_SA_KEY }}" ]; then
            echo "no GCP creds configured; skipping deploy"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Authenticate to GCP
        if: steps.guard.outputs.enabled == 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up gcloud
        if: steps.guard.outputs.enabled == 'true'
        uses: google-github-actions/setup-gcloud@v2
      - name: Build, push, and roll out
        if: steps.guard.outputs.enabled == 'true'
        run: |
          gcloud auth configure-docker us-docker.pkg.dev -q
          docker build -t "${{ secrets.GAR_IMAGE }}:${GITHUB_SHA}" .
          docker push "${{ secrets.GAR_IMAGE }}:${GITHUB_SHA}"
          gcloud container clusters get-credentials "${{ secrets.GKE_CLUSTER }}" \
            --zone "${{ secrets.GKE_ZONE }}" --project "${{ secrets.GCP_PROJECT }}"
          for f in k8s/20-mcp-servers.yaml k8s/30-agents.yaml k8s/40-ui-ingress.yaml; do
            sed "s#REPLACE_IMAGE#${{ secrets.GAR_IMAGE }}:${GITHUB_SHA}#g" "$f" | kubectl apply -f -
          done
          kubectl -n reg-agents rollout status deploy/orchestrator --timeout=180s
